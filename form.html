<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء كاتلوج</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="form-container">
        <h2 id="formTitle">إنشاء كاتلوج جديد</h2>
        <input type="hidden" id="catalogId">

        <h3>بيانات الشركة</h3>
        <input id="companyName" placeholder="اسم الشركة">
        <input id="companyNotes" placeholder="اضف ملاحظاتك">
        <input id="companyPhone" placeholder="رقم التواصل">
        <input type="file" id="companyLogo" accept="image/*">

        <hr>

        <label>لون الثيم</label>
        <input type="color" id="themeColor" value="#2ecc71">

        <label>نوع الخط</label>
        <select id="fontFamily">
            <option value="Arial">Arial</option>
            <option value="Cairo">Cairo</option>
            <option value="Tajawal">Tajawal</option>
        </select>

        <label>حجم الخط</label>
        <input type="number" id="fontSize" value="20" min="20" step="1">

        <label>لون الخط</label>
        <input type="color" id="fontColor" value="#000000">

        <label>وزن الخط</label>
        <select id="fontWeight">
            <option value="normal">عادي</option>
            <option value="bold">Bold</option>
        </select>

        <label>اللغة</label>
        <select id="direction">
            <option value="rtl">عربي</option>
            <option value="ltr">English</option>
        </select>

        <hr>

        <h3>إضافة منتج</h3>
        <input id="productName" placeholder="اسم المنتج">
        <input id="publicPrice" type="number" placeholder="سعر مستهلك">
        <input id="pharmacyPrice" type="number" placeholder="سعر الصيدلي">
        <input type="file" id="productImage" accept="image/*">

        <button id="addProductButton" type="button" onclick="addProduct(event)">إضافة المنتج</button>
        <div id="productsList" class="products-list"></div>
        <button type="button" onclick="removeSelected()">حذف المحدد</button>

        <hr>

        <div class="form-actions">
            <button class="primary" type="button" onclick="saveCatalog(event)">حفظ التعديلات</button>
            <button class="primary" type="button" onclick="goPreview(event)">معاينة الكاتلوج</button>
            <button type="button" onclick="clearForm(event)">كاتلوج جديد</button>
            <button type="button" onclick="window.location.href='/'">قائمة الكاتلوجات</button>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
